{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="contenido">
    <div class="page-header">
        <div>
            <span class="eyebrow">Rutina</span>
            <h1>{{ titulo }}</h1>
            <p>Asigna un plan semanal claro y fácil de consultar para cada alumno.</p>
        </div>
    </div>

    <form method="POST">
        <label>Alumno</label>
        <select name="alumno" required>
            {% for alumno in alumnos %}
            <option value="{{ alumno.nombre }}" {% if rutina and rutina.alumno == alumno.nombre %}selected{% endif %}>{{ alumno.nombre }}</option>
            {% endfor %}
        </select>

        <label>Lunes</label>
        <input type="text" name="lunes" value="{{ rutina.lunes if rutina else '' }}">

        <label>Martes</label>
        <input type="text" name="martes" value="{{ rutina.martes if rutina else '' }}">

        <label>Miércoles</label>
        <input type="text" name="miercoles" value="{{ rutina.miercoles if rutina else '' }}">

        <label>Jueves</label>
        <input type="text" name="jueves" value="{{ rutina.jueves if rutina else '' }}">

        <label>Viernes</label>
        <input type="text" name="viernes" value="{{ rutina.viernes if rutina else '' }}">

        <div class="action-group" style="margin-top: 12px;">
            <button class="agregar" type="submit">Guardar Rutina</button>
            <a href="/rutinas"><button type="button">Cancelar</button></a>
        </div>
    </form>
</div>
{% endblock %}
