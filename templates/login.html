<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>GymManager - Iniciar sesión</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login">

    <h1>GymManager</h1>

    <p>Sistema de Gestión de Gimnasios</p>

    {% if error %}

        <p style="color:red; text-align:center;">
            {{ error }}
        </p>

    {% endif %}

    <form method="POST">

        <label>Usuario</label>

        <input
            type="text"
            name="usuario"
            placeholder="Ingrese su usuario"
            required>

        <label>Contraseña</label>

        <input
            type="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required>

        <button type="submit">

            Iniciar sesión

        </button>

    </form>

</div>

</body>
</html>
