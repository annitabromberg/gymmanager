<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymManager - Iniciar sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="login-video-wrapper">
        <video autoplay muted loop playsinline preload="auto">
            <source src="{{ url_for('static', filename='login-bg.mp4') }}" type="video/mp4">
        </video>
        <div class="login-video-overlay"></div>
    </div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">GF</div>
            <div>
                <h1>GymManager</h1>
                <p>Tu gimnasio en una sola plataforma</p>
            </div>
        </div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" class="login-form">
            <div class="field-group">
                <label for="usuario">Usuario</label>
                <input id="usuario" type="text" name="usuario" placeholder="Ingrese su usuario" required>
            </div>

            <div class="field-group">
                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>

            <button type="submit">Iniciar sesión</button>
        </form>
    </div>
</body>
</html>
