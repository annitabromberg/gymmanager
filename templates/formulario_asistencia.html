{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="contenido">
    <div class="page-header">
        <div>
            <span class="eyebrow">Asistencia</span>
            <h1>{{ titulo }}</h1>
            <p>Registra el ingreso de los alumnos de manera rápida y consistente.</p>
        </div>
    </div>

    <form method="POST">
        <label>Alumno</label>
        <select name="nombre" required>
            {% for alumno in alumnos %}
            <option value="{{ alumno.nombre }}" {% if registro and registro.nombre == alumno.nombre %}selected{% endif %}>{{ alumno.nombre }}</option>
            {% endfor %}
        </select>

        <label>Fecha</label>
        <input type="date" name="fecha" value="{{ registro.fecha if registro else '' }}">

        <label>Hora</label>
        <input type="time" name="hora" value="{{ registro.hora if registro else '' }}">

        <label>Estado</label>
        <select name="estado">
            <option value="Presente" {% if registro and registro.estado == 'Presente' %}selected{% endif %}>Presente</option>
            <option value="Ausente" {% if registro and registro.estado == 'Ausente' %}selected{% endif %}>Ausente</option>
        </select>

        <div class="action-group" style="margin-top: 12px;">
            <button class="agregar" type="submit">Guardar</button>
            <a href="/asistencia"><button type="button">Cancelar</button></a>
        </div>
    </form>
</div>
{% endblock %}
